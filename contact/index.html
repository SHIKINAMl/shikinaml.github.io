<!doctype html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Shikinami Portfolio</title>

<body data-page="contact">

    <main>
        <section class="section">
            <div class="container">
                <p class="eyebrow">Contact</p>

            </div>

        <section class="section">

                <article class="contact-form-panel">
                    <h2>Googleフォーム</h2>
                    <div class="form-embed-wrap">
                        <iframe
                            title="お問い合わせフォーム"
                            src=""

                            loading="lazy"
                        >
                            読み込んでいます…
                        </iframe>
                    </div>
                </article>

                <aside class="contact-sub-links" aria-label="その他の連絡先">

                    <!-- 個人アカウント -->
                    <div class="account-group">
                        <h3 class="account-group-title">個人アカウント</h3>
                        <dl class="account-list">
                            <dt>メールアドレス：</dt>
                            <dd><a href="mailto:myukku1213@gmail.com">myukku1213@gmail.com</a></dd>

                            <dt>GitHub：</dt>
                            <dd><a href="https://github.com/shikinaml" target="_blank" rel="noopener noreferrer">github.com/shikinaml</a></dd>
                        </dl>
                    </div>

                    <p class="account-note">
                            ⚠️ <strong>注意：</strong>
                            以下は所属サークル・研究室のアカウントです。個人への連絡の場合は、上記の個人アカウントからお願いします。
                    </p>

                    <!-- サークルアカウント -->
                    <div class="account-group">
                        <h3 class="account-group-title">サークルのアカウント</h3>

                        <dl class="account-list">
                            <dt>Twitter：</dt>
                            <dd><a href="https://x.com/seap_creators" target="_blank" rel="noopener noreferrer">@seap_creators</a></dd>
                        </dl>
                        
                    </div>

                    <!-- 研究室アカウント -->
                    <div class="account-group">
                        <h3 class="account-group-title">研究室のアカウント</h3>
                        <dl class="account-list">
                            <dt>ウェブサイト：</dt>
                            <dd><a href="https://kazukik.weebly.com/" target="_blank" rel="noopener noreferrer">kazukik.weebly.com</a></dd>
                        </dl>
                    </div>
                </aside>
            </div>
        </section>

    <div data-include="../common/components/footer.html"></div>

    <script src="../common/js/layout.js"></script>
