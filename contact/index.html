<!doctype html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Shikinami Portfolio</title>
    <meta name="description" content="連絡先ページです。メールフォームと各種リンクを掲載しています。" />
    <link rel="stylesheet" href="../common/css/base.css" />
    <link rel="stylesheet" href="style.css" />
</head>

<body data-page="contact">
    <div data-include="../common/components/header.html"></div>

    <main>
        <section class="section">
            <div class="container">
                <p class="eyebrow">Contact</p>
                <h1>連絡先</h1>
                <p class="lead">ひとことでも大歓迎です。気軽にメッセージを送ってください。</p>
            </div>
        </section>

        <section class="section">
            <div class="container contact-main">
                <article class="contact-form-panel">
                    <h2>Contact me</h2>
                    <p class="form-lead">サイトの感想やコメントなど、気軽にどうぞ。</p>
                    <form class="contact-form" id="contact-form">
                        <div class="field-row">
                            <label for="contact-name">Name</label>
                            <input id="contact-name" name="name" type="text" autocomplete="name" required />
                        </div>

                        <div class="field-row">
                            <label for="contact-email">Email</label>
                            <input id="contact-email" name="email" type="email" autocomplete="email" required />
                        </div>

                        <div class="field-row">
                            <label for="contact-message">Comment</label>
                            <textarea id="contact-message" name="message" rows="7" required></textarea>
                        </div>

                        <button class="send-button" type="submit">Send</button>
                        <p class="form-note" id="form-note" aria-live="polite">送信後、その場で完了をお知らせします。</p>
                    </form>
                </article>

                <aside class="contact-sub-links" aria-label="その他の連絡先">
                    <h2>Direct Links</h2>
                    <p class="account-note">フォーム以外から連絡したい場合は、こちらを使ってください。</p>
                    <dl class="account-list">
                        <dt>Email</dt>
                        <dd><a href="mailto:myukku1213@gmail.com">myukku1213@gmail.com</a></dd>
                        <dt>GitHub</dt>
                        <dd><a href="https://github.com/shikinaml" target="_blank" rel="noopener noreferrer">github.com/shikinaml</a></dd>
                    </dl>

                    <p class="account-note">以下は所属先の関連リンクです。</p>
                    <dl class="account-list">
                        <dt>サークル</dt>
                        <dd>公式アカウント：<a href="https://x.com/seap_creators" target="_blank" rel="noopener noreferrer">@seap_creators</a></dd>
                        <dt>研究室</dt>
                        <dd>Webサイト：<a href="https://kazukik.weebly.com/" target="_blank" rel="noopener noreferrer">kazukik.weebly.com</a></dd>
                    </dl>
                </aside>
            </div>
        </section>
    </main>

    <div data-include="../common/components/footer.html"></div>

    <script src="../common/js/layout.js"></script>
    <script src="script.js"></script>
</body>
</html>
